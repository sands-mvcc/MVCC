<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.C.A.L.E. Framework Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2e7d32;
            --accent-green: #4caf50;
            --black: #1a1a1a;
            --white: #ffffff;
            --light-gray: #f8faf8;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            color: var(--black);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background-color: var(--black);
            color: var(--white);
            padding: 2.5rem 5%;
            border-bottom: 6px solid var(--primary-green);
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 5%;
        }

        h1 { margin: 0; font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; }
        .subtitle { color: var(--accent-green); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }

        /* Framework Cards */
        .framework-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 2rem 0;
        }

        .card {
            background: var(--light-gray);
            border: 2px solid #eee;
            padding: 1.5rem 1rem;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-green);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card h2 { color: var(--primary-green); font-size: 2.5rem; margin: 0; font-weight: 900; }
        .card p { margin: 5px 0 0; font-weight: 600; font-size: 0.85rem; color: #555; }

        /* Interactive Lab Section - FIXED SPACING */
        #lab-section {
            background: var(--light-gray);
            padding: 2.5rem;
            border-radius: 20px;
            margin: 2rem 0 4rem 0; /* Clear bottom margin */
            border: 1px solid #ddd;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem; }
        
        input, select {
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd;
            border-radius: 8px; 
            font-size: 1rem; 
            box-sizing: border-box; /* Crucial for width alignment */
        }

        input:focus, select:focus { border-color: var(--primary-green); outline: none; }

        /* Output Box */
        #output-box {
            background: var(--black);
            color: var(--accent-green);
            padding: 2rem;
            border-radius: 15px;
            margin-top: 1.5rem;
            position: relative;
            font-family: 'Courier New', monospace;
            min-height: 80px;
            word-wrap: break-word;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            transition: opacity 0.2s;
        }

        .copy-btn { background: var(--primary-green); color: white; }
        .reset-btn { background: #444; color: white; }
        .btn:hover { opacity: 0.9; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: 20px;
            position: relative;
            border-top: 10px solid var(--primary-green);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }
        .pro-tip { background: #e8f5e9; padding: 15px; border-left: 4px solid var(--primary-green); margin-top: 20px; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .input-row { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Instructional Design Power Tools</div>
    <h1>The S.C.A.L.E. Framework</h1>
</header>

<div class="container">
    <div class="framework-grid">
        <div class="card" onclick="openModal('S')"><h2>S</h2><p>Subject</p></div>
        <div class="card" onclick="openModal('C')"><h2>C</h2><p>Composition</p></div>
        <div class="card" onclick="openModal('A')"><h2>A</h2><p>Annotation</p></div>
        <div class="card" onclick="openModal('L')"><h2>L</h2><p>Lighting</p></div>
        <div class="card" onclick="openModal('E')"><h2>E</h2><p>Execution</p></div>
    </div>

    <section id="lab-section">
        <h2>Live Prompt Builder</h2>
        
        <div class="input-row">
            <div class="input-group">
                <label>S - Subject & Science</label>
                <input type="text" id="subject" placeholder="e.g. Mitochondria anatomy" oninput="updatePrompt()">
            </div>
            <div class="input-group">
                <label>C - Composition</label>
                <select id="composition" onchange="updatePrompt()">
                    <option value="Detailed isometric cutaway">Isometric Cutaway</option>
                    <option value="Birds-eye view diagram">Birds-eye View</option>
                    <option value="Sequential three-panel storyboard">3-Panel Flow</option>
                    <option value="Macro close-up photography">Macro Photography</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>A - Annotation (Labels)</label>
            <input type="text" id="annotation" placeholder="e.g. Label the 'Outer Membrane' and 'Matrix'" oninput="updatePrompt()">
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>L - Lighting & Look</label>
                <select id="lighting" onchange="updatePrompt()">
                    <option value="Clean 3D render, high-tech style">3D Render (STEM)</option>
                    <option value="Flat vector illustration, 2D infographic">Flat Vector (Minimalist)</option>
                    <option value="Vintage scientific textbook illustration">Vintage Sketch</option>
                    <option value="Cinematic lighting, hyper-realistic">Photorealistic</option>
                </select>
            </div>
            <div class="input-group">
                <label>E - Execution</label>
                <select id="execution" onchange="updatePrompt()">
                    <option value="Clean white background, 4K, aspect ratio 16:9">Slide (16:9, White BG)</option>
                    <option value="Transparent background, high resolution, 1:1">Icon (1:1, Transparent)</option>
                    <option value="Soft bokeh background, 3:4 ratio">Handout (3:4)</option>
                </select>
            </div>
        </div>

        <div id="output-box">
            <div id="final-prompt">Your synthesized prompt will appear here...</div>
        </div>
        
        <div class="btn-container">
            <button class="btn copy-btn" onclick="copyPrompt()">COPY PROMPT</button>
            <button class="btn reset-btn" onclick="resetForm()">RESET</button>
        </div>
    </section>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Title</h3>
        <p id="modalDescription">Description</p>
        <div class="pro-tip" id="modalTip">Pro-Tip</div>
    </div>
</div>

<script>
    const scaleData = {
        'S': { title: 'Subject & Science', desc: 'Define the core object. Be technical and specific to your field.', tip: '<strong>Pro-Tip:</strong> Use the specific nouns found in your learning objectives.' },
        'C': { title: 'Composition', desc: 'The layout of the image. Helps students focus on the right data points.', tip: '<strong>Pro-Tip:</strong> Use "Cutaway" to show internal structures of hardware or biology.' },
        'A': { title: 'Annotation', desc: 'Direct text rendering. Place your desired labels in "quotes".', tip: '<strong>Pro-Tip:</strong> Keep labels to 5 or fewer for maximum visual impact.' },
        'L': { title: 'Lighting & Look', desc: 'The aesthetic mood. This should match the tone of your course.', tip: '<strong>Pro-Tip:</strong> 2D Flat Vector is often the most accessible for screen readers.' },
        'E': { title: 'Execution', desc: 'The technical export settings like aspect ratio and resolution.', tip: '<strong>Pro-Tip:</strong> Use 16:9 for PowerPoint and 3:4 for printed worksheets.' }
    };

    function openModal(l) {
        document.getElementById('modalTitle').innerText = scaleData[l].title;
        document.getElementById('modalDescription').innerText = scaleData[l].desc;
        document.getElementById('modalTip').innerHTML = scaleData[l].tip;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function updatePrompt() {
        const s = document.getElementById('subject').value || "[Subject]";
        const c = document.getElementById('composition').value;
        const a = document.getElementById('annotation').value;
        const l = document.getElementById('lighting').value;
        const e = document.getElementById('execution').value;
        
        document.getElementById('final-prompt').innerText = 
            `Instructional Graphic: ${s}. ${c}. ${a ? a + '. ' : ''}Style: ${l}. Technical: ${e}.`;
    }

    function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById('final-prompt').innerText);
        alert("Prompt copied!");
    }

    function resetForm() {
        document.getElementById('subject').value = "";
        document.getElementById('annotation').value = "";
        updatePrompt();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.C.A.L.E. Framework Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2e7d32;
            --accent-green: #4caf50;
            --black: #1a1a1a;
            --white: #ffffff;
            --light-gray: #f8faf8;
            --overlay: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            color: var(--black);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: var(--black);
            color: var(--white);
            padding: 3rem 5%;
            border-bottom: 6px solid var(--primary-green);
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 5%;
        }

        h1 { margin: 0; font-weight: 800; font-size: 2.8rem; letter-spacing: -1px; }
        .subtitle { color: var(--accent-green); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }

        /* Framework Cards */
        .framework-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 3rem 0;
        }

        .card {
            background: var(--light-gray);
            border: 2px solid #eee;
            padding: 2rem 1rem;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-green);
            background: var(--white);
            box-shadow: 0 15px 30px rgba(46, 125, 50, 0.1);
        }

        .card h2 {
            color: var(--primary-green);
            font-size: 3rem;
            margin: 0;
            font-weight: 900;
        }

        .card p { margin: 10px 0 0; font-weight: 600; font-size: 0.9rem; color: #555; }

        /* Custom Modal Logic */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: 20px;
            position: relative;
            border-top: 10px solid var(--primary-green);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-content h3 { color: var(--primary-green); margin-top: 0; font-size: 1.8rem; }
        .pro-tip { background: #e8f5e9; padding: 15px; border-left: 4px solid var(--primary-green); margin-top: 20px; font-size: 0.9rem; }

        /* Interactive Lab */
        #lab-section {
            background: var(--light-gray);
            padding: 3rem;
            border-radius: 20px;
            margin-top: 4rem;
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 700; margin-bottom: 0.5rem; }
        input, select {
            width: 100%; padding: 15px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 1rem; transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary-green); outline: none; }

        #output-box {
            background: var(--black);
            color: var(--accent-green);
            padding: 2.5rem;
            border-radius: 15px;
            margin-top: 2rem;
            position: relative;
            font-family: 'Courier New', monospace;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .copy-btn {
            position: absolute; top: 15px; right: 15px;
            background: var(--primary-green); color: white;
            border: none; padding: 8px 18px; border-radius: 5px; cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .framework-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Instructional Design Power Tools</div>
    <h1>The S.C.A.L.E. Framework</h1>
    <p>Visual Asset Engineering for Modern Faculty</p>
</header>

<div class="container">
    <div class="framework-grid">
        <div class="card" onclick="openModal('S')">
            <h2>S</h2><p>Subject</p>
        </div>
        <div class="card" onclick="openModal('C')">
            <h2>C</h2><p>Composition</p>
        </div>
        <div class="card" onclick="openModal('A')">
            <h2>A</h2><p>Annotation</p>
        </div>
        <div class="card" onclick="openModal('L')">
            <h2>L</h2><p>Lighting</p>
        </div>
        <div class="card" onclick="openModal('E')">
            <h2>E</h2><p>Execution</p>
        </div>
    </div>

    <section id="lab-section">
        <h2>Live Prompt Builder</h2>
        <div class="input-group">
            <label>S - Subject & Science</label>
            <input type="text" id="subject" placeholder="What are we teaching? (e.g., A 5G Network Topology)" oninput="updatePrompt()">
        </div>
        <div class="input-group">
            <label>C - Composition</label>
            <select id="composition" onchange="updatePrompt()">
                <option value="Birds-eye view diagram">Birds-eye View</option>
                <option value="Detailed isometric cutaway">Isometric Cutaway</option>
                <option value="Microscopic macro shot">Macro (Close-up)</option>
                <option value="Three-step process flow">Step-by-Step Flow</option>
            </select>
        </div>
        <div class="input-group">
            <label>A - Annotation (Labels)</label>
            <input type="text" id="annotation" placeholder="Labels (e.g., Label 'Input', 'Process', and 'Output')" oninput="updatePrompt()">
        </div>
        <div id="output-box">
            <button class="copy-btn" onclick="copyPrompt()">COPY PROMPT</button>
            <div id="final-prompt">Start building your instructional graphic...</div>
        </div>
    </section>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Title</h3>
        <p id="modalDescription">Description</p>
        <div class="pro-tip" id="modalTip">Pro-Tip</div>
    </div>
</div>

<script>
    const scaleData = {
        'S': {
            title: 'Subject & Science',
            desc: 'The core instructional object. Be hyper-specific about the domain. Instead of "a computer," use "A dissected enterprise-grade server rack showing the CPU and cooling fans."',
            tip: '<strong>Pro-Tip:</strong> Use nouns from your syllabus. Nano Banana 2 understands technical jargon better than general terms.'
        },
        'C': {
            title: 'Composition & Clarity',
            desc: 'How is the information presented? Isometric views are best for complex systems, while flat-lays work well for categorized items.',
            tip: '<strong>Pro-Tip:</strong> Mention "Rule of Thirds" or "Centered Focal Point" to guide where students should look first.'
        },
        'A': {
            title: 'Annotation & Accuracy',
            desc: 'Text labels in diagrams. Nano Banana 2 can now spell correctly! Tell it exactly what to write in quotes.',
            tip: '<strong>Pro-Tip:</strong> Ask for "Clean, sans-serif typography" to ensure accessibility for students with visual impairments.'
        },
        'L': {
            title: 'Lighting & Look',
            desc: 'The aesthetic style. For STEM, use "Clean 3D render." For History, use "Documentary photography style."',
            tip: '<strong>Pro-Tip:</strong> Keep a consistent style across your entire course to build a professional brand.'
        },
        'E': {
            title: 'Execution & Export',
            desc: 'The technical metadata. Aspect ratio (16:9 for slides), resolution (4K), and background (white for handouts).',
            tip: '<strong>Pro-Tip:</strong> Always prompt for a "solid white background" if you plan on removing the background later in PowerPoint.'
        }
    };

    function openModal(letter) {
        const data = scaleData[letter];
        document.getElementById('modalTitle').innerText = data.title;
        document.getElementById('modalDescription').innerText = data.desc;
        document.getElementById('modalTip').innerHTML = data.tip;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function updatePrompt() {
        const s = document.getElementById('subject').value || "[Subject]";
        const c = document.getElementById('composition').value;
        const a = document.getElementById('annotation').value || "";
        const fullPrompt = `Graphic for college instruction: ${s}. ${c}. ${a}. Highly detailed, educational quality. White background.`;
        document.getElementById('final-prompt').innerText = fullPrompt;
    }

    function copyPrompt() {
        const text = document.getElementById('final-prompt').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
